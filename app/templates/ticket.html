<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Detail</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f9fafb; min-height: 100vh; }
        .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem; }
        .back { font-size: 14px; color: #4f46e5; text-decoration: none; display: inline-block; margin-bottom: 1.5rem; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .ticket-title { font-size: 18px; font-weight: 600; color: #111; }
        .ticket-meta { font-size: 13px; color: #6b7280; margin-top: 4px; }
        .badge { font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }
        .Open { background: #dbeafe; color: #1e40af; }
        .InProgress { background: #fef9c3; color: #854d0e; }
        .Closed { background: #dcfce7; color: #166534; }
        .divider { border: none; border-top: 1px solid #e5e7eb; margin: 1.2rem 0; }
        .description { font-size: 14px; color: #374151; line-height: 1.6; }
        .section-title { font-size: 14px; font-weight: 500; color: #111; margin-bottom: 0.75rem; }
        .update-row { display: flex; gap: 10px; align-items: flex-start; }
        select, textarea { border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 12px; font-size: 14px; }
        textarea { flex: 1; resize: vertical; }
        .btn-primary { background: #4f46e5; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .notes-list { margin-top: 1rem; }
        .note-item { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 13px; color: #374151; }
        .note-time { font-size: 11px; color: #9ca3af; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← Back to tickets</a>
        <div class="card" id="ticketDetail">
            <p style="color:#6b7280;">Loading...</p>
        </div>
    </div>
    <script src="/static/ticket.js"></script>
</body>
</html>
